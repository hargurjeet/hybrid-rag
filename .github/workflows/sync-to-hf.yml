name: Sync to Hugging Face hub

on:
  push:
    branches: [main] # Triggers on push to the main branch
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # Important for handling large files (>10MB)
      
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "gurjeet333@gmail.com"
          git config --global user.name "hargurjeet"
          git push https://Hargurjeet:${HF_TOKEN}@huggingface.co/spaces/Hargurjeet/hybrid_rag_hf main